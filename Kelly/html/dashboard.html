<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <title>Luces Casa</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimal-ui" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge">

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-barstyle" content="black-translucent">
  <link rel="apple-touch-icon" href="../assets/images/iconoMayKe_s.ico">
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="shortcut icon" sizes="196x196" href="../assets/images/iconoMayKe_s.ico">
  
  <link class="rtl-none" rel="stylesheet" href="../assets/font-awesome/css/font-awesome.min.css" type="text/css" />
  <link class="rtl-none" rel="stylesheet" href="../assets/bootstrap/dist/css/bootstrap.min.css" type="text/css" />
  <link class="rtl-none" rel="stylesheet" href="../assets/material-design-icons/material-design-icons.css" type="text/css" />
  <link class="rtl-none" rel="stylesheet" href="../assets/styles/app.css" type="text/css" />
  <link class="rtl-none" rel="stylesheet" href="../assets/styles/font.css" type="text/css" />

  <style>
    /* Distribución responsiva inteligente para los interruptores */
    .switches-container {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 12px;
      padding: 5px 0;
    }
    
    .switches-container .box {
      margin-bottom: 0 !important; /* Eliminar márgenes antiguos */
      display: flex;
      align-items: center;
      padding: 15px !important;
    }

    /* En dispositivos móviles muy pequeños, forzar uno debajo del otro */
    @media (max-width: 576px) {
      .switches-container {
        grid-template-columns: 1fr;
        gap: 8px;
      }
    }
  </style>
</head>
<body>
  <div class="app" id="app">
  
    <!-- aside -->
    <div id="aside" class="app-aside modal nav-dropdown">
      <div class="left navside dark dk" data-layout="column">
        <div class="navbar no-radius">
          <a class="navbar-brand">
            <span class="hidden-folded inline">MAYKE</span><br>
            <span class="hidden-folded inline">SOLUCIONES</span>
          </a>
        </div>
        <div class="hide-scroll" data-flex>
          <nav class="scroll nav-light">
            <ul class="nav" ui-nav>
              <li class="nav-header hidden-folded">
                <small class="text-muted">Principal</small>
              </li>
              <li>
                <a href="dashboard.html">
                  <span class="nav-icon"><i class="material-icons">&#xe3fc;</i></span>
                  <span class="nav-text">Pagina principal</span>
                </a>
              </li>
              <li>
                <a href="tareasProgramadas.html">
                  <span class="nav-icon"><i class="material-icons">&#xe5c3;</i></span>
                  <span class="nav-text">Tareas</span>
                </a>
              </li>
            </ul>
          </nav>
        </div>
        <div class="b-t">
          <div class="nav-fold">
            <a href="">
              <span class="pull-left">
                <img src="../assets/images/familia.jpg" alt="..." class="w-40 img-circle">
              </span>
              <span class="clear hidden-folded p-x">
                <span class="block _500">Familia Mercado Martinez.</span>
                <small class="block text-muted"><i class="fa fa-circle text-success m-r-sm"></i>online</small>
              </span>
            </a>
          </div>
        </div>
      </div>
    </div>

    <!-- content -->
    <div id="content" class="app-content box-shadow-z0" role="main">
      <div class="app-header white box-shadow">
        <div class="navbar navbar-toggleable-sm flex-row align-items-center justify-content-between">
    
          <div class="flex-row align-items-center">
            <a data-toggle="modal" data-target="#aside" class="hidden-lg-up mr-3">
              <i class="material-icons">&#xe5d2;</i>
            </a>
            <span id="display_conexion" class="label danger">Desconectado</span>
          </div>
        
          <ul class="nav navbar-nav flex-row align-items-center">
            <li class="nav-item m-r-md">
              <button onclick="iniciar_reco_VOZ()" id="btn" class="btn btn-sm btn-default btn-rounded">  
                <img src="../assets/images/microfono.png" alt="Mic" style="width:20px; height:20px;">
              </button>
            </li>
            <li class="nav-item dropdown">
              <a class="nav-link p-0 clear" href="#" data-toggle="dropdown">
                <span class="avatar w-32">
                  <img src="../assets/images/familia.jpg" alt="...">
                  <i class="on b-white bottom"></i>
                </span>
              </a>
            </li>
          </ul>
        </div>
      </div>

      <div ui-view class="app-body" id="view">
        <!-- ############ PAGE START-->
        <div class="p-a white lt box-shadow">
          <div class="row">
            <div class="col-sm-12">
              <h3 class="mb-0 _300">Bienvenido</h3>
              <small class="text-muted">CONTROL <strong>v1.0.0-</strong>Luces Kelly</small>
            </div>
          </div>
          <p class="contenido"></p>
        </div>

        <div class="padding">
          <!-- CONTENEDOR RESPONSIVO DE BOTONES -->
          <div class="switches-container">

              <div class="box p-a">
                <label class="md-switch">
                  <input onchange="sw1_change()" type="checkbox" class="has-value" id="display_sw1">
                  <i class="blue"></i>
                  ESTUDIO.
                </label>
              </div>

              <div class="box p-a">
                <label class="md-switch">
                  <input onchange="sw2_change()" type="checkbox" class="has-value" id="display_sw2">
                  <i class="blue"></i>
                  AREA DE LABORES.
                </label>
              </div>

              <div class="box p-a">
                <label class="md-switch">
                  <input onchange="sw3_change()" type="checkbox" class="has-value" id="display_sw3">
                  <i class="blue"></i>
                  ESCALERA.
                </label>
              </div>

              <div class="box p-a">
                <label class="md-switch">
                  <input onchange="sw4_change()" type="checkbox" class="has-value" id="display_sw4">
                  <i class="blue"></i>
                  SALA PRINCIPAL
                </label>
              </div>

              <div class="box p-a">
                <label class="md-switch">
                  <input onchange="sw5_change()" type="checkbox" class="has-value" id="display_sw5">
                  <i class="blue"></i>
                  COCINA.
                </label>
              </div>

              <div class="box p-a">
                <label class="md-switch">
                  <input onchange="sw6_change()" type="checkbox" class="has-value" id="display_sw6">
                  <i class="blue"></i>
                  FRENTE.
                </label>
              </div>

              <div class="box p-a">
                <label class="md-switch">
                  <input onchange="sw7_change()" type="checkbox" class="has-value" id="display_sw7">
                  <i class="blue"></i>
                  HABITACION PRINCIPAL.
                </label>
              </div>

              <div class="box p-a">
                <label class="md-switch">
                  <input onchange="sw8_change()" type="checkbox" class="has-value" id="display_sw8">
                  <i class="blue"></i>
                  AUXILARES-PASILLO.
                </label>
              </div>
              
          </div>
        </div>

        <!-- BOTÓN SALIR FIJO ABAJO EN FOOTER -->
        <div class="app-footer p-a text-xs text-center white b-t">
          <a class="btn btn-sm rounded danger text-u-c _600" href="signin.html">SALIR</a>
        </div>

        <!-- CONFIG COLOR DE TEMA FONDO -->
        <div id="switcher">
          <div class="switcher box-color dark-white text-color" id="sw-theme">
            <a href ui-toggle-class="active" target="#sw-theme" class="box-color dark-white text-color sw-btn">
              <i class="fa fa-gear"></i>
            </a>
            <div class="box-header">
              <h2>TEMAS DE FONDOS</h2>
            </div>
            <div class="box-divider"></div>
            <div class="box-body">
              <div data-target="bg" class="row no-gutter text-u-c text-center _600 clearfix">
                <label class="p-a col-6 light pointer m-0"><input type="radio" name="theme" value="" hidden>Light</label>
                <label class="p-a col-6 grey pointer m-0"><input type="radio" name="theme" value="grey" hidden>Grey</label>
                <label class="p-a col-6 dark pointer m-0"><input type="radio" name="theme" value="dark" hidden>Dark</label>
                <label class="p-a col-6 black pointer m-0"><input type="radio" name="theme" value="black" hidden>Black</label>
              </div>
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="../libs/jquery/jquery/dist/jquery.js"></script>
  <script src="../libs/jquery/tether/dist/js/tether.min.js"></script>
  <script src="../libs/jquery/bootstrap/dist/js/bootstrap.js"></script>
  <script src="../libs/jquery/underscore/underscore-min.js"></script>
  <script src="../libs/jquery/jQuery-Storage-API/jquery.storageapi.min.js"></script>
  <script src="scripts/config.lazyload.js"></script>
  <script src="scripts/ui-jp.js"></script>
  <script src="scripts/ui-include.js"></script>
  <script src="scripts/ui-toggle-class.js"></script>
  <script src="scripts/app.js"></script>
  <script src="scripts/ably.min-1.js" type="text/javascript"></script>
  <script src="scripts/conexionmqtt.js"></script>
  <script src="scripts/p5.min.js"></script>
  <script src="scripts/p5.dom.min.js"></script>
  <script src="scripts/p5.speech.js"></script>
  <script src="scripts/vozatexto.js"></script>
</body>
</html>
